<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生物詳細</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="header">
    <button onclick="location.href='/creatures-page'" style="background:none; color:#333; font-size:20px;">←</button>
    <h1>生物詳細</h1>
    <div></div>
</div>

<div class="container" style="padding-top:20px;">
    <div class="card" style="text-align:center;">
        <div id="creature-icon" style="font-size:80px; margin-bottom:10px;">🐛</div>
        <h2 id="creature-name">読み込み中...</h2>
        <p id="creature-scientific" style="color:#999; font-size:13px; margin-top:4px;"></p>
    </div>

    <div class="card" style="margin-top:16px;">
        <h3 style="margin-bottom:12px;">飼育方法</h3>
        <p id="care-guide" style="color:#555; line-height:1.7;">未生成</p>
        <button id="generate-btn" onclick="generateCareGuide()" style="width:100%; margin-top:16px;">
            AIで飼育方法を生成
        </button>
    </div>
</div>

<nav class="bottom-nav">
    <div class="nav-item" onclick="location.href='/creatures-page'">
        <span class="nav-icon">📖</span>
        <span>図鑑</span>
    </div>
    <div class="nav-item" onclick="location.href='/cage-page'">
        <span class="nav-icon">🧺</span>
        <span>虫かご</span>
    </div>
    <div class="nav-item">
        <span class="nav-icon">👤</span>
        <span>マイページ</span>
    </div>
</nav>
<script>
    const token = localStorage.getItem("token");
    const params = new URLSearchParams(window.location.search);
    const creatureId = params.get("id");

    async function loadCreature() {
        const res = await fetch(`/creatures/${creatureId}`, {
            headers: { "Authorization": "Bearer " + token }
        });
        const c = await res.json();

        const iconEl = document.getElementById("creature-icon");
        if (c.image_url && c.image_url.startsWith("http")) {
            iconEl.innerHTML = `<img src="${c.image_url}" style="width:100px; height:100px; border-radius:12px; object-fit:cover;">`;
        } else {
            iconEl.textContent = c.image_url || "🐛";
        }
        document.getElementById("creature-name").textContent = c.name;
        document.getElementById("care-guide").textContent = c.care_guide || "未生成";
    }

    async function generateCareGuide() {
        document.getElementById("generate-btn").textContent = "生成中...";
        const res = await fetch(`/creatures/${creatureId}/care-guide`, {
            method: "POST",
            headers: { "Authorization": "Bearer " + token }
        });
        if (res.ok) {
            loadCreature();
            document.getElementById("generate-btn").textContent = "AIで飼育方法を生成";
        }
    }

    loadCreature();
</script>

</body>
</html>
