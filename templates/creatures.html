<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>図鑑一覧</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<script>
    const token = localStorage.getItem("token");

    async function loadCreatures() {
        const res = await fetch("/creatures", {
            headers: {
                "Authorization": "Bearer " + token
            }
        });
        const creatures = await res.json();

        const list = document.getElementById("creature-list");
        list.innerHTML = "";

        creatures.forEach(c => {
            const badge = c.care_guide
                ? '<span class="badge ok">飼育方法あり</span>'
                : '<span class="badge none">飼育方法未生成</span>';

            list.innerHTML += `
                <div class="creature-card">
                    <div class="creature-icon">🐛</div>
                    <div class="creature-info">
                        <h3>${c.name}</h3>
                        <span class="badge">${badge}</span>
                    </div>
                </div>
            `;
        });
    }

    loadCreatures();
</script>
<body>

<div class="header">
    <h1>📖 図鑑一覧</h1>
    <button class="add-btn">＋追加</button>
</div>

<p class="subtitle">登録した生物</p>
<div id="creature-list"></div>

<div class="creature-card">
    <div class="creature-icon">🌸</div>
    <div class="creature-info">
        <h3>さくら</h3>
        <div class="scientific">Prunus × yedoensis</div>
        <span class="badge ok">飼育方法あり</span>
    </div>
</div>

<div class="creature-card">
    <div class="creature-icon">🌼</div>
    <div class="creature-info">
        <h3>タンポポ</h3>
        <div class="scientific">Taraxacum officinale</div>
        <span class="badge none">飼育方法未生成</span>
    </div>
</div>

<div class="creature-card">
    <div class="creature-icon">🪲</div>
    <div class="creature-info">
        <h3>カブトムシ</h3>
        <div class="scientific">Trypoxylus dichotomus</div>
        <span class="badge ok">飼育方法あり</span>
    </div>
</div>

<nav class="bottom-nav">
    <div class="nav-item active">
        <span class="nav-icon">📖</span>
        <span>図鑑</span>
    </div>
    <div class="nav-item">
        <span class="nav-icon">🧺</span>
        <span>虫かご</span>
    </div>
    <div class="nav-item">
        <span class="nav-icon">👤</span>
        <span>マイページ</span>
    </div>
</nav>

</body>
</html>
